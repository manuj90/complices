<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <script>
      (function () {
        var t = localStorage.getItem('complices-theme');
        var d = t === 'dark' || (!t && matchMedia('(prefers-color-scheme: dark)').matches);
        document.documentElement.classList.add(d ? 'dark' : 'light');
      })();
    </script>
    <!-- Favicon: sigue la preferencia de color del navegador/SO, independiente del toggle de tema de la página -->
    <link rel="icon" type="image/svg+xml" href="/caras-negras.svg" media="(prefers-color-scheme: light)" />
    <link rel="icon" type="image/svg+xml" href="/caras-blancas.svg" media="(prefers-color-scheme: dark)" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Cómplices — Marca y experiencia" />
    <meta name="color-scheme" content="light dark" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Syne:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <title>Cómplices</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
